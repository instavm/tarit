name: Release

# Builds static (musl) x86_64 Linux binaries for the orchestrator (taritd) and
# the microVM manager (vmm), then publishes them as a GitHub Release.
#
# Triggered by pushing a version tag (e.g. `v0.1.0`). A manual `workflow_dispatch`
# run only builds and uploads the binaries as workflow artifacts; it never
# creates a Release, so the build can be validated before cutting a real tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Least privilege by default: the build job needs no write access. The release
# job elevates to `contents: write` for itself only.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  TARGET: x86_64-unknown-linux-musl

jobs:
  build:
    name: Build musl binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-unknown-linux-musl

      # zig provides a complete cross sysroot, which lets the C dependencies in
      # the tree (aws-lc-rs via russh, etc.) build cleanly for the musl target.
      - name: Install zig
        uses: mlugg/setup-zig@53fc45b17fe98b52f92ee5ea08ff48a85a3e7eb7 # v1
        with:
          version: 0.13.0

      # Prebuilt binary — avoids compiling cargo-zigbuild from source each run.
      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-zigbuild

      - name: Cache cargo build (orch)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: orch
          key: release-orch

      - name: Build taritd (orchestrator)
        working-directory: orch
        run: cargo zigbuild --release --locked --target "$TARGET" -p taritd

      - name: Cache cargo build (vmm)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: vmm
          key: release-vmm

      - name: Build vmm (microVM manager, with KVM boot path)
        working-directory: vmm
        run: cargo zigbuild --release --locked --target "$TARGET" -p vmm --features boot

      - name: Build guest agent
        working-directory: vmm/guest/agent
        run: make

      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "orch/target/$TARGET/release/taritd" dist/taritd
          cp "vmm/target/$TARGET/release/vmm" dist/vmm
          cp "vmm/guest/agent/vmm-agent" dist/vmm-agent
          strip dist/taritd dist/vmm dist/vmm-agent

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: dist/tarit.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum taritd vmm vmm-agent tarit.spdx.json > SHA256SUMS
          cat SHA256SUMS

      # Smoke-test the exact artifacts we are about to publish (they run natively
      # on the x86_64 runner). Kept to checks that need no host environment:
      # both `--version`/`--help` exit before any KVM or TAP/netlink setup, so
      # they are reliable here. Actually booting a VM or starting a taritd node
      # needs /dev/kvm + CAP_NET_ADMIN and belongs on a self-hosted KVM host.
      - name: Smoke-test binaries
        run: |
          set -euo pipefail
          cd dist
          for bin in taritd vmm vmm-agent; do
            echo "== $bin =="
            file "$bin"
            file "$bin" | grep -q "statically linked"
          done
          ./vmm --version
          ./vmm --help > /dev/null
          ./taritd --version
          ./taritd --help > /dev/null

      - name: Attest release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-x86_64-musl
          path: dist/

  release:
    name: Publish GitHub Release
    needs: build
    # Only real tag pushes publish a Release; manual dispatch (even against a
    # tag ref) stops after the build job above.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the Release and upload assets
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-x86_64-musl
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/taritd
            dist/vmm
            dist/vmm-agent
            dist/tarit.spdx.json
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          body: |
            Static x86_64 Linux (musl) binaries, built from ${{ github.ref_name }}.

            - `taritd` — orchestrator daemon
            - `vmm` — microVM manager
            - `vmm-agent` — static guest exec/PTY agent for image creation
            - `tarit.spdx.json` — SPDX software bill of materials

            Verify with `sha256sum -c SHA256SUMS`. Booting microVMs requires Linux with `/dev/kvm`.
