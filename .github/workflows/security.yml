name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 5 * * 1" # weekly, Monday 05:17 UTC, catches new advisories
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    name: cargo-deny (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [proto, vmm, orch]
    steps:
      - uses: actions/checkout@v4

      # Checks advisories, licenses, bans, and sources against the root
      # deny.toml for each cargo workspace.
      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          manifest-path: ${{ matrix.workspace }}/Cargo.toml
          command-arguments: --config deny.toml

  scorecard:
    name: openssf scorecard
    runs-on: ubuntu-latest
    # scorecard-action only supports the default branch and schedules.
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      actions: read
      # Needed to upload SARIF results to code scanning.
      security-events: write
      # Needed by scorecard-action to publish results.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard.sarif
