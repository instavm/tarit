# preserved, so this crate stays Apache-2.0 rather than inheriting the workspace
# AGPL license. See LICENSE in this directory and the root NOTICE file.
license = "Apache-2.0"

[lib]
bench = false

[dependencies]
displaydoc = "0.2.5"
thiserror = "1"
vm-memory = { workspace = true }
zerocopy = { version = "0.8.48", features = ["derive"] }

[lints]
workspace = true
