[package]
name = "acpi_tables"
version.workspace = true
authors = [
    "The Cloud Hypervisor Authors",
    "Amazon Firecracker team <firecracker-devel@amazon.com>",
]
edition.workspace = true
# This crate is vendored/adapted from the Cloud Hypervisor and Firecracker
